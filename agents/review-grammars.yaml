# review-grammars.yaml — single source of truth for the four human-gated
# review artifact grammars (agent-addressable review, M10-M13; the summary
# table in ROADMAP.md's M10 section is derived from this file).
#
# Consumers: scripts/validate-review-artifact.sh (the deterministic parser and
# counter), agents/review-validation.md (the interpretation contract), the
# amanuensis-review companion skill, and the fix/apply steps of migrated
# families. Step docs reference this file rather than restating token sets.
#
# Adoption markers. Each family carries exactly one adoption marker line with
# value `adopted` or `pending`. `adopted` means the structured grammar below
# is authoritative for the family and the validator applies to its artifact.
# `pending` means the family's current in-step annotation grammar remains
# authoritative until the milestone named in `migrates_in` flips the marker;
# the validator rejects the family with a not-yet-adopted error until then.
#
# Machine-read keys — parsed by scripts/validate-review-artifact.sh; keep them
# flat, single-line, and free of colons in their values:
#   adoption, migrates_in, path_pattern, tokens, payload_optional,
#   payload_required, payload_forbidden, selection_tokens, bulk_supported,
#   bulk_actions, bulk_payload_optional, container_pattern,
#   container_exempt_suffix, id_item_pattern, id_min_locations,
#   item_line_pattern
# `selection_tokens` is the metaphor family's second-evidence-layer key: the
# `Decision:` tokens that make an entry actionable and so require a filled
# `Selected:` in the validator's `--round selection` pass. Only a family
# declaring it has a selection layer; for every other family the round
# selector, the `Selected:` / `Selection-note:` parsing, and the two extra
# selection-round ledger rows never engage, so their output is unchanged.
# No adopted family sets bulk support; the bulk keys remain machine-read so
# that a stray `BULK:` header in any artifact is rejected as invalid input
# rather than silently ignored.
# Every other key is contract prose for agents and humans; the script never
# reads it. Token lists are space-separated; the script reads them from here
# and hardcodes nothing.
#
# Id-shape and anchor-adjacency enforcement. `id_item_pattern` is an ERE the
# review-id's trailing item segment must match in full. `id_min_locations`
# is the minimum number of location segments between the family prefix and
# the item-id — the family's shortest legal (short_story) form: 0 for
# prose_pass, whose short_story form is `prose_pass:finding-NN`; 1 for the
# scene-sectioned families. `item_line_pattern` is an ERE the line
# immediately after an anchor must match — the unit's own item line; an
# anchor followed by anything else (another anchor, a Decision field, a
# blank line, end of file) is an orphaned anchor and fails structural
# validation.
#
# Container detection (optional per family). `container_pattern` is a heading
# prefix identifying a section of the report that must hold anchored review
# units when it holds violation content (compliance uses `### Block `;
# anti_ai is settled with a plain `### ` and no exempt keys — every `### `
# heading in its artifact is a category container; prose_pass is settled with
# the single literal `#### Findings` heading and exempt suffix `— none`,
# because its report carries sibling `#### ` / `### ` headings — `#### Top
# priorities`, `### Chapter-level diagnosis` and its `#### ` subsections,
# `#### Lines worth preserving` — that legitimately hold no anchored units, so
# the container is one specific heading rather than a bare `#### `). A
# container heading ending in `container_exempt_suffix` (compliance: `— CLEAN`;
# prose_pass: `— none`) legitimately holds no units. Any other container with
# zero anchored units fails structural validation as invalid — this is what
# makes a positional/pre-migration report an invalid input rather than a
# silently empty one. Families that leave these keys unset get no container
# check.
#
# Heading-item orphan check (structural, additive). For a family whose
# `item_line_pattern` is a heading (metaphor `^### `, prose_pass `^##### `),
# the `container_pattern` check catches a fully unanchored section but not a
# lone item-line heading carrying neither an anchor nor a decision field. The
# validator closes that gap directly: inside its heading rule, a line matching
# the family's `item_line_pattern` with no anchor on the line immediately
# above it is an invalid orphaned item. It is auto-scoped to heading-item
# families — a bullet-item family's `^- ` never matches a `#` line, so
# compliance / anti_ai never misfire — and it fires on no existing fixture.
#
# All four families are now `adopted`; none is pending. metaphor is the one
# family that settles its container as **no `container_pattern`**: with every
# figure anchored and the orphan-item check live, a pre-migration report
# (unanchored `### ` figures) is rejected per figure as an orphaned item, and
# a no-figures scene records a single `No figures.` line (zero `### ` headings,
# no orphan, valid). A scene-level `container_pattern: "## Metaphor Report"`
# was rejected: it would flag the legitimate no-figures scene as an empty
# container unless the scene heading carried a `— none`-style exempt suffix,
# uglier than the `No figures.` marker the orphan check already permits.
# metaphor's `#### ` variant sections (appended by metaphor_fix) sit a level
# below `^### `, so they never read as a figure item line or a container.
#
# Shared review item shape (ROADMAP.md M10 shared-design principle 3):
#
#   <!-- review-id: ... -->          anchor, immediately above the item
#   <the item as the producing step emits it>
#     - Decision:                    legal token, plus payload where the
#                                    grammar requires or permits one
#     - Decision-note:               optional free text; never machine-parsed
#
# `Decision:` carries the machine-readable what; `Decision-note:` the human
# why. A blank `Decision:` means pending — no review evidence — for every
# family, with no exceptions. A payload follows its token after a colon,
# e.g. `Decision: FIX: cut the clause`.
#
# The metaphor family adds a second evidence layer on its actionable entries
# (`Decision:` in `selection_tokens`): a `- Selected:` field holding one
# machine-clean variant id and an optional `- Selection-note:` free-text
# field — the same machine-what / human-note split as `Decision:` /
# `Decision-note:` (`Selected:` the id chosen, `Selection-note:` the human's
# inline edit to it, never machine-parsed). They are parsed only in the
# validator's `--round selection` pass; see the metaphor family's
# `selection_layer` / `selection_note` keys.
#
# review-id grammar: `<artifact-family>:<location...>:<item-id>`.
#   book / series : <family>:<book-id>:<chapter-id>[:<scene-id>]:<item-id>
#   short_story   : <family>[:<scene-id>]:<item-id>  (book/chapter collapse)
# Location segments are derivable from the artifact's resolved path (the
# book and chapter folder names, per agents/project-layouts.md) plus
# identifiers already present in the report (scene ids, block numbers,
# category names, emission ordinals). The scene segment appears only for
# artifacts with per-scene sections (compliance, anti_ai, metaphor);
# prose_pass is chapter-scoped and has no scene segment. Nothing is invented
# that is not already on disk. IDs are unique within the artifact +
# `Reviewed-draft:` epoch only; regeneration discards prior findings and may
# re-mint IDs (shared-design principle 9).
#
# Fixtures: examples/review/ holds one specimen per family in the target
# format, each documenting its expected ledger; they are the validator's test
# inputs. See examples/review/README.md.

compliance:
  adoption: adopted
  migrates_in: M10
  artifact: reviewer-actions.md
  path_pattern: reviewer-actions.md
  path: "<chapter-folder>/drafts/<latest-attempt>/reviewer-actions.md"
  producer: compliance_report
  consumer: compliance_fix
  item_shape: "One review unit per violation line. The anchor sits immediately above the violation line; `- Decision:` / `- Decision-note:` are nested one level below it. `CLEAN` blocks stay a single `### Block NNN — CLEAN` line with no anchor and no fields — they are not review units and never inflate counts. A non-CLEAN `### Block` section with zero anchored units fails structural validation: a positional/pre-M10 report is an invalid input, never a silently empty one."
  required_fields: Decision
  optional_fields: Decision-note
  anchor: "`<!-- review-id: ... -->` on its own line immediately above the violation line it addresses"
  review_id_item: "block-<NNN>-v<KK> — the storyboard block number plus the violation's ordinal within that block's entry, both already in the report"
  review_id_book: "compliance:<book-id>:<chapter-id>:<scene-id>:block-<NNN>-v<KK> — e.g. compliance:book1:chapter02:02-03:block-050-v01"
  review_id_short_story: "compliance:<scene-id>:block-<NNN>-v<KK> — e.g. compliance:01-01:block-011-v01"
  id_item_pattern: "block-[0-9][0-9][0-9]-v[0-9][0-9]"
  id_min_locations: 1
  item_line_pattern: "^- "
  container_pattern: "### Block "
  container_exempt_suffix: "— CLEAN"
  tokens: FIX SKIP ESCALATE
  payload_optional: FIX
  payload_required:
  payload_forbidden: SKIP ESCALATE
  payload_meaning: "The FIX payload is the fix instruction, carried to compliance_fix exactly as the positional `FIX: <instruction>` annotation carried it before migration."
  blank_means: "pending — the unit carries no review evidence; any actionable violation with a blank Decision blocks compliance_fix as review_pending (per-unit gate, deliberately stronger than the old whole-file gate)"
  bulk_supported: no
  bulk_rules: "None. No generic bulk of any kind; every actionable violation is decided per entry."
  counting: "Review unit = one violation line (one anchor). CLEAN blocks are not units. Progress = decided + skipped + escalated over total."
  review_evidence: "A filled `Decision:` field holding a legal token, with payload where given."
  proceed_state: "compliance_fix proceeds only at zero actionable-pending units and zero invalid units. Staleness is a separate axis, adjudicated per the Artifact-state contract in agents/orchestrator.md (recorded override lifts stale only, never pending or invalid)."
  fixture: examples/review/reviewer-actions.md

prose_pass:
  adoption: adopted
  migrates_in: M12
  artifact: prose-pass.md
  path_pattern: prose-pass.md
  path: "<chapter-folder>/drafts/<latest-attempt>/prose-pass.md"
  producer: prose_pass
  consumer: prose_fix
  item_shape: "One review unit per finding — every finding, KEEP included. The anchor sits immediately above the finding's `##### [short label]` heading; `- Decision:` / `- Decision-note:` sit among the finding's fields, below the `Action:` line. A `#### Findings` section with zero anchored units fails structural validation: a positional/pre-M12 report is an invalid input, never a silently empty one. A report that found nothing records a single `#### Findings — none` heading plus a `No findings.` line — no anchor, no fields, not a review unit."
  required_fields: Decision
  optional_fields: Decision-note
  anchor: "`<!-- review-id: ... -->` on its own line immediately above the finding's `##### [short label]` heading"
  review_id_item: "finding-<NN> — the finding's emission ordinal within the report, counted over every finding (KEEP included)"
  review_id_book: "prose_pass:<book-id>:<chapter-id>:finding-<NN> — e.g. prose_pass:book1:chapter02:finding-01 (chapter-scoped report; no scene segment)"
  review_id_short_story: "prose_pass:finding-<NN> — e.g. prose_pass:finding-01"
  id_item_pattern: "finding-[0-9][0-9]"
  id_min_locations: 0
  item_line_pattern: "^##### "
  container_pattern: "#### Findings"
  container_exempt_suffix: "— none"
  tokens: FIX SKIP ESCALATE
  payload_optional: FIX
  payload_required:
  payload_forbidden: SKIP ESCALATE
  payload_meaning: "The FIX payload is the human's inline instruction, followed instead of (or in addition to) the finding's recommended Action. On a KEEP finding — which carries no severity fix strategy — a bare FIX has no default and prose_fix treats it as ESCALATE; a `FIX: <instruction>` applies the instruction sentence-locally."
  blank_means: "pending — any finding with a blank Decision blocks prose_fix as review_pending, KEEP findings included. A KEEP finding's explicit SKIP is the review evidence that the human confirmed the producer's keep; a blank on it is still pending."
  bulk_supported: no
  bulk_rules: "None — no bulk and no fan-out anywhere in this family (locked M5, restated in the post-Sprint-16 vocabulary). The pass is selective (5-10 findings), so per-entry decisions are the point. The validator rejects any BULK header in this artifact as invalid; no fanout_categories are declared, so the companion offers no category grouping and no fan-out."
  counting: "Review unit = one finding, KEEP included. A KEEP finding decided SKIP counts as skipped. A `#### Findings — none` report contributes no units. Progress = decided + skipped + escalated over total."
  review_evidence: "A filled `Decision:` field holding a legal token, with payload where given."
  proceed_state: "prose_fix proceeds only at zero pending units and zero invalid units; staleness per the Artifact-state contract."
  fixture: examples/review/prose-pass.md

anti_ai:
  adoption: adopted
  migrates_in: M11
  artifact: anti-ai.md
  path_pattern: anti-ai.md
  path: "<chapter-folder>/drafts/<latest-attempt>/anti-ai.md"
  producer: anti_ai_report
  consumer: anti_ai_fix
  item_shape: "One review unit per flagged instance, listed under its `### <Category>` subsection inside a scene section. The anchor sits immediately above the unit's single top-level `- ` entry line; auxiliary lines (e.g. Synonym Cycling's `- Cycled terms:`) and the `- Decision:` / `- Decision-note:` fields are nested one level below it. A scene with zero flags records its scene header plus a single `No flags.` line — no anchor, no fields, not a review unit. A non-empty `### ` category section with zero anchored units fails structural validation: a positional/pre-M11 report is an invalid input, never a silently empty one."
  required_fields: Decision
  optional_fields: Decision-note
  anchor: "`<!-- review-id: ... -->` on its own line immediately above the flagged instance's entry line"
  review_id_item: "<category-slug>-<NN> — the category name lowercased and dash-joined, plus the instance's emission ordinal within that category and scene (e.g. em-dashes-03, negative-parallelism-01)"
  review_id_book: "anti_ai:<book-id>:<chapter-id>:<scene-id>:<category-slug>-<NN> — e.g. anti_ai:book1:chapter02:02-01:em-dashes-01"
  review_id_short_story: "anti_ai:<scene-id>:<category-slug>-<NN> — e.g. anti_ai:01-01:em-dashes-01"
  id_item_pattern: "[a-z0-9-]+-[0-9][0-9]"
  id_min_locations: 1
  item_line_pattern: "^- "
  container_pattern: "### "
  tokens: FIX SKIP ESCALATE
  payload_optional: FIX
  payload_required:
  payload_forbidden: SKIP ESCALATE
  payload_meaning: "The FIX payload is the fix instruction, carried to anti_ai_fix in the unit's `Decision:` field (e.g. `Decision: FIX: comma`)."
  blank_means: "pending — the unit carries no review evidence; there is no inheritance of any kind, and any flagged instance with a blank Decision blocks anti_ai_fix as review_pending (per-unit gate)"
  bulk_supported: no
  bulk_rules: "None — header bulk retired in Sprint 16 under the AI-plus-human review directive. The artifact carries no bulk grammar of any kind: a `BULK:` header is invalid input, never silently tolerated. Category-level review survives as companion fan-out per the fanout_categories / fanout_rules keys below — decisions land in per-unit `Decision:` fields, never in headers."
  fanout_categories: em-dashes copula-avoidance superficial-ing-analysis transition-openers flagged-words
  fanout_rules: "Companion capture behavior, not artifact grammar (contract prose; the validator never reads the fanout keys). Recommended defaults: em-dashes `FIX: rewrite`; the other eligible categories bare `FIX`. One human statement adjudicates the category's pending units: the companion writes the stated decision into each pending unit's `Decision:` field and marks each `Decision-note:` as a category decision — the audit record that the unit was decided at category level. Per-entry exceptions are stated per unit and kept as the unit's own decision."
  counting: "Review unit = one flagged instance (one anchor). `No flags.` scenes contribute no units. Progress = decided + skipped + escalated over total."
  review_evidence: "A filled `Decision:` field holding a legal token, with payload where given."
  proceed_state: "anti_ai_fix proceeds only at zero pending units and zero invalid units; staleness per the Artifact-state contract."
  fixture: examples/review/anti-ai.md

metaphor:
  adoption: adopted
  migrates_in: M13
  artifact: metaphors.md
  path_pattern: metaphors.md
  path: "<chapter-folder>/drafts/<latest-attempt>/metaphors.md"
  producer: metaphor_identify
  consumer: metaphor_fix metaphor_apply
  item_shape: "One review unit per figure. The anchor sits immediately above the entry's `### [Short label]` heading; `- Decision:` / `- Decision-note:` replace the free-text `Human Assessment:` line among the entry's fields. Deletion is not a decision signal: a rejected figure carries `Decision: REJECT` and stays in the file as the audit record. On an actionable entry (`Decision:` in `selection_tokens`) metaphor_fix inserts a blank `- Selected:` / `- Selection-note:` pair among the entry's fields — after `Decision-note:`, before the variant heading, so both sit inside the anchored unit — and appends a stable-id variant set as a `#### ` section (`#### Flatten Options` / `#### Replace Options` / `#### Workshop Candidates`) below the unit. Pre-migration rejection is by the heading-item orphan check, not a `container_pattern`: an unanchored `### ` figure is an invalid orphaned item, and a no-figures scene records `## Metaphor Report — Scene xx-yy` plus a single `No figures.` line (zero `### ` headings, no orphan, valid)."
  required_fields: Decision
  optional_fields: Decision-note
  anchor: "`<!-- review-id: ... -->` on its own line immediately above the entry's `### [Short label]` heading"
  review_id_item: "figure-<NN> — the entry's emission ordinal within its scene section"
  review_id_book: "metaphor:<book-id>:<chapter-id>:<scene-id>:figure-<NN> — e.g. metaphor:book1:chapter02:02-03:figure-04"
  review_id_short_story: "metaphor:<scene-id>:figure-<NN> — e.g. metaphor:01-02:figure-03"
  id_item_pattern: "figure-[0-9][0-9]"
  id_min_locations: 1
  item_line_pattern: "^### "
  tokens: KEEP REJECT FLATTEN REPLACE WORKSHOP
  payload_optional:
  payload_required: REPLACE
  payload_forbidden: KEEP REJECT FLATTEN WORKSHOP
  payload_meaning: "The REPLACE payload is the target image the human wants integrated (`REPLACE: <image>`)."
  replace_policy: "Bare REPLACE is invalid — the payload is REQUIRED, and a bare REPLACE is not normalized to WORKSHOP (this supersedes the treat-as-WORKSHOP convenience retired from agents/steps/metaphor-fix.md in M13). WORKSHOP is the ask-for-candidates path; REPLACE is the integrate-this-image path. Locked in M10 per ROADMAP M10.1."
  selection_tokens: FLATTEN REPLACE WORKSHOP
  selection_layer: "The second evidence layer, metaphor-only, gating metaphor_apply through the validator's `--round selection` pass. The `Decision:` tokens in `selection_tokens` (FLATTEN / REPLACE / WORKSHOP) make an entry actionable — metaphor_fix generates variants for it and it requires a filled `Selected:` in the selection round; KEEP / REJECT are terminal and carry no selection. `Selected:` holds exactly one variant id (the per-variant label the fix subagents assign — A / B / C for flatten and replace, A–H for workshop), machine-clean and validated structurally as a single well-formed token; a blank `Selected:` on an actionable entry is selection-pending, and a `Selected:` on a KEEP / REJECT entry, or a multi-token / malformed value, is invalid. The validator checks `Selected:` structurally only — it does not confirm the id names an appended variant; metaphor_apply resolves the id to prose under its existing anchor-gate and blocks / skips, never guesses, if it cannot."
  selection_note: "`Selection-note:` is optional free text the validator never parses — the human's inline edit to the chosen variant, read by metaphor_apply as the target form. The same machine-field / human-note split as `Decision:` / `Decision-note:`: `Decision-note:` carries round-one corrections, `Selection-note:` carries round-two edits."
  blank_means: "pending — an entry with a blank Decision is unreviewed; the producer's CLEAN / REVIEW / BROKEN flag is a recommendation, never a disposition. Selection layer: a blank `Selected:` on an actionable entry is selection-pending — counted only in the selection round, over actionable entries."
  bulk_supported: no
  bulk_rules: "None. Every figure is decided per entry; no auto-disposition from CLEAN / REVIEW / BROKEN flags, and no auto-selection of a variant."
  counting: "Review unit = one figure. All five tokens are decisions (metaphor has no SKIP / ESCALATE), so a file of all KEEP / REJECT is fully decided. The selection layer counts selection-pending / selected over actionable entries only (`Decision:` in selection_tokens); terminal KEEP / REJECT entries carry no selection and are pass-through."
  review_evidence: "Round one: a filled `Decision:` field holding a legal token, with the image payload on REPLACE. Round two (actionable entries only): a filled `Selected:` naming one variant id, with any inline edit in `Selection-note:`."
  proceed_state: "Two consumers, two layers. metaphor_fix (`--round decision`) proceeds only at zero decision-pending units and zero invalid units, then acts only on FLATTEN / REPLACE / WORKSHOP entries — an all-KEEP/REJECT file is a clean no-op. metaphor_apply (`--round selection`) proceeds only at zero decision-pending units, zero selection-pending units, and zero invalid units, treating an all-KEEP/REJECT file as valid pass-through. Staleness per the Artifact-state contract: metaphor_apply's recorded override lifts stale only, never pending, selection-pending, or invalid; metaphor_fix mints no draft and carries no override branch."
  fixture: examples/review/metaphors.md
